name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  registry-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check registry consistency
        run: python scripts/check_registry.py
      - name: Check public content
        run: python scripts/check_public_content.py
